<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Store - Loja Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🛍️ Victoria Store</h1>
            </div>
            <nav class="nav">
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </nav>
        </div>
    </header>
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h2>Bem-vindo à Victoria Store</h2>
                <p>Gerencie seus produtos de forma prática e rápida</p>
            </div>
        </section>

        <!-- Produtos Section -->
        <section class="produtos-section">
            <div class="container">
                <h2>Nossos Produtos</h2>
                <div id="produtosList" class="produtos-grid">
                    <p class="loading">Carregando produtos...</p>
                </div>
            </div>
        </section>

        <!-- Cadastro Section -->
        <section class="cadastro-section">
            <div class="container">
                <div class="form-wrapper">
                    <h2>Cadastrar Novo Produto</h2>
                    
                    <div id="successAlert" class="alert alert-success" style="display: none;">
                        <span>✓</span> <span id="successText"></span>
                    </div>
                    
                    <div id="errorAlert" class="alert alert-error" style="display: none;">
                        <span>✕</span> <span id="errorText"></span>
                    </div>

                    <form id="produtoForm" class="form">
                        <div class="form-group">
                            <label for="nome">Nome do Produto *</label>
                            <input type="text" id="nome" name="nome" placeholder="Ex: Notebook Dell" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="preco">Preço (R$) *</label>
                                <input type="number" id="preco" name="preco" placeholder="0.00" step="0.01" min="0" required>
                            </div>

                            <div class="form-group">
                                <label for="categoria">Categoria *</label>
                                <select id="categoria" name="categoria" required>
                                    <option value="">Selecione...</option>
                                    <option value="Eletrônicos">Eletrônicos</option>
                                    <option value="Roupas">Roupas</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Esportes">Esportes</option>
                                    <option value="Livros">Livros</option>
                                    <option value="Alimentos">Alimentos</option>
                                    <option value="Beleza">Beleza</option>
                                    <option value="Brinquedos">Brinquedos</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="descricao">Descrição *</label>
                            <textarea id="descricao" name="descricao" placeholder="Descreva o produto..." rows="4" required></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">✓ Cadastrar</button>
                            <button type="reset" class="btn btn-secondary">↻ Limpar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Victoria Store. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
