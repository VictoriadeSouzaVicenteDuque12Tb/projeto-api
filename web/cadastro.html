<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - Victoria Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header/Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>🛍️ Victoria Store</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="produtos.html">Produtos</a>
                <a href="cadastro.html" class="active">Cadastrar</a>
            </nav>
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <!-- Cadastro Section -->
    <section class="cadastro-container">
        <h2 class="form-title">Cadastrar Novo Produto</h2>
        <p class="form-subtitle">Preencha os campos abaixo para adicionar um novo produto à loja</p>

        <div id="successAlert" class="alert alert-success" style="display: none;">
            <h4>✓ Sucesso!</h4>
            <p id="successMessage"></p>
        </div>

        <div id="errorAlert" class="alert alert-error" style="display: none;">
            <h4>✕ Erro!</h4>
            <p id="errorMessage"></p>
        </div>

        <form id="productForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">Nome do Produto *</label>
                <input type="text" id="name" name="name" placeholder="Ex: Notebook Dell" required>
            </div>

            <div class="form-group">
                <label for="price">Preço (R$) *</label>
                <input type="number" id="price" name="price" placeholder="Ex: 1999.99" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label for="category">Categoria *</label>
                <select id="category" name="category" required>
                    <option value="">Selecione uma categoria</option>
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Roupas">Roupas</option>
                    <option value="Casa">Casa e Decoração</option>
                    <option value="Esportes">Esportes</option>
                    <option value="Livros">Livros</option>
                    <option value="Alimentos">Alimentos</option>
                    <option value="Beleza">Beleza e Higiene</option>
                    <option value="Brinquedos">Brinquedos</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Descrição *</label>
                <textarea id="description" name="description" placeholder="Descreva as características do produto..." rows="5" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-submit">✓ Cadastrar</button>
                <button type="reset" class="btn btn-reset">↻ Limpar</button>
            </div>
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Victoria Store. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
